version: '3.8'

services:
  # Backend API service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    # 🌟 NATIVE WATCH SYSTEM
    develop:
      watch:
        # Syncs everything from your local /server folder to the container's /app folder instantly
        - path: ./server
          action: sync
          target: /app
          ignore:
            - ./server/node_modules
        # If your teammates pull a Git update that changes package.json, automatically rebuild the image
        - path: ./server/package.json
          action: rebuild

  # Frontend Client service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_SERVER_URL=http://server:5000
    depends_on:
      - server
    # 🌟 NATIVE WATCH SYSTEM
    develop:
      watch:
        # Syncs everything from your local /client folder to the container's /app folder instantly
        - path: ./client
          action: sync
          target: /app
          ignore:
            - ./client/node_modules
        # Automatically rebuild the client image if dependencies are added/changed
        - path: ./client/package.json
          action: rebuild